---
# ============================================
# Deployment - 后端 API 服务
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hxfund-api
  namespace: hxfund
  labels:
    app: huangshi-genealogy
    component: api
    version: "3.3.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: huangshi-genealogy
      component: api
  template:
    metadata:
      labels:
        app: huangshi-genealogy
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: hxfund-api
      automountServiceAccountToken: false
      containers:
      - name: api
        image: huangshi/api:3.3.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: hxfund-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: hxfund-config
              key: PORT
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: hxfund-config
              key: ALLOWED_ORIGINS
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: hxfund-config
              key: LOG_LEVEL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: hxfund-config
              key: REDIS_URL
        - name: QWEN_API_KEY
          valueFrom:
            secretKeyRef:
              name: hxfund-secret
              key: QWEN_API_KEY
        - name: DASHSCOPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: hxfund-secret
              key: DASHSCOPE_API_KEY
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: hxfund-secret
              key: JWT_SECRET
        - name: SERVER_API_KEY
          valueFrom:
            secretKeyRef:
              name: hxfund-secret
              key: SERVER_API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: config
          mountPath: /app/server/config
          readOnly: true
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
      volumes:
      - name: logs
        emptyDir: {}
      - name: config
        configMap:
          name: hxfund-api-config
          defaultMode: 0644
      imagePullSecrets:
      - name: docker-registry-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
---
# API 配置 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: hxfund-api-config
  namespace: hxfund
data:
  auth.json.example: |
    {
      "serverApiKey": "${SERVER_API_KEY}",
      "jwtSecret": "${JWT_SECRET}",
      "tokenExpiresIn": 86400000,
      "rateLimit": {
        "windowMs": 60000,
        "maxRequests": 30,
        "maxChatRequests": 10
      }
    }
