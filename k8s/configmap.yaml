---
# ============================================
# ConfigMap - 应用配置
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: hxfund-config
  namespace: hxfund
  labels:
    app: huangshi-genealogy
data:
  # 通用配置
  NODE_ENV: "production"
  PORT: "3000"

  # CORS 配置
  ALLOWED_ORIGINS: "https://hxfund.cn,https://www.hxfund.cn,https://api.hxfund.cn,https://qxu1606470020.my3w.com"

  # 日志配置
  LOG_LEVEL: "info"

  # Redis 配置
  REDIS_URL: "redis://hxfund-redis:6379"

  # 会话配置
  SESSION_RETENTION_DAYS: "30"
  SESSION_COMPRESS: "true"

  # 速率限制配置
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "30"
  RATE_LIMIT_MAX_CHAT_REQUESTS: "10"

  # AI 配置
  QWEN_MODEL: "qwen3.5-plus"
  QWEN_BASE_URL: "https://coding.dashscope.aliyuncs.com/v1"
  QWEN_TEMPERATURE: "0.7"

  # 健康检查端点
  HEALTH_PATH: "/api/health"

  # Sentry 配置
  SENTRY_ENVIRONMENT: "production"
  SENTRY_TRACES_SAMPLE_RATE: "0.1"
