---
# ============================================
# Secret - 敏感配置
# ============================================
# 注意：生产环境建议使用外部密钥管理 (如 HashiCorp Vault, AWS Secrets Manager)
# 或使用 SealedSecrets/ExternalSecrets Operator
apiVersion: v1
kind: Secret
metadata:
  name: hxfund-secret
  namespace: hxfund
  labels:
    app: huangshi-genealogy
type: Opaque
stringData:
  # API Keys - 需要替换为实际值
  QWEN_API_KEY: "sk-xxxxxxxxxxxxxxxxxxxxxxxx"
  DASHSCOPE_API_KEY: "sk-xxxxxxxxxxxxxxxxxxxxxxxx"

  # Redis 密码（如果启用认证）
  REDIS_PASSWORD: "your-redis-password"

  # JWT 密钥
  JWT_SECRET: "your-jwt-secret-key-change-in-production"

  # 服务器 API 密钥
  SERVER_API_KEY: "hs_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

  # SSL 证书（Base64 编码）
  # 使用以下命令生成：base64 -w 0 cert.pem
  SSL_CERTIFICATE: |
    -----BEGIN CERTIFICATE-----
    YOUR_CERTIFICATE_HERE
    -----END CERTIFICATE-----

  SSL_PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    YOUR_PRIVATE_KEY_HERE
    -----END PRIVATE KEY-----

  # FTP 配置（用于部署脚本）
  FTP_HOST: "your-ftp-server.com"
  FTP_USER: "your-ftp-username"
  FTP_PASS: "your-ftp-password"

  # 阿里云配置
  ALIYUN_ACCESS_KEY_ID: "your-access-key-id"
  ALIYUN_ACCESS_KEY_SECRET: "your-access-key-secret"

  # 微信推送配置
  WX_WEBHOOK_URL: "https://your-webhook-url/wxsend"
  WX_WEBHOOK_TOKEN: "your-webhook-token"
