<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen AI 客户端测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .chat-container {
            padding: 25px;
            height: 500px;
            display: flex;
            flex-direction: column;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        
        .ai-message {
            background: #e9ecef;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        
        .message-header {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            padding: 10px 0;
        }
        
        .input-area textarea {
            flex: 1;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            resize: none;
            font-size: 14px;
            min-height: 60px;
            transition: border-color 0.3s;
        }
        
        .input-area textarea:focus {
            outline: none;
            border-color: #007bff;
        }
        
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .input-area button:hover {
            transform: translateY(-2px);
        }
        
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .control-group {
            flex: 1;
            min-width: 200px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        .control-group select,
        .control-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px;
            color: #666;
            font-style: italic;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Qwen AI 客户端</h1>
            <p>黄氏家族寻根平台 - AI 对话测试</p>
        </div>
        
        <div class="chat-container">
            <div class="controls">
                <div class="control-group">
                    <label for="modelSelect">选择模型:</label>
                    <select id="modelSelect">
                        <option value="qwen3.5-plus">Qwen3.5-Plus (多模态)</option>
                        <option value="qwen3-max-2026-01-23">Qwen3-Max-2026-01-23</option>
                        <option value="qwen3-coder-next">Qwen3-Coder-Next</option>
                        <option value="qwen3-coder-plus">Qwen3-Coder-Plus</option>
                        <option value="qwen-max">Qwen-Max (复杂任务)</option>
                        <option value="qwen-plus">Qwen-Plus (平衡性能)</option>
                        <option value="qwen-turbo">Qwen-Turbo (快速响应)</option>
                        <option value="qwen-mini">Qwen-Mini (轻量高效)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="temperature">温度 (Creativity):</label>
                    <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.7">
                    <span id="tempValue">0.7</span>
                </div>
            </div>
            
            <div id="status" class="status" style="display: none;"></div>
            
            <div class="messages" id="messages">
                <div class="message ai-message">
                    <div class="message-header">🤖 Qwen AI</div>
                    <div class="message-content">您好！我是通义千问 AI 助手。我可以回答关于黄氏家族寻根的问题，或者任何其他问题。请随时提问！</div>
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                Qwen AI 正在思考中...
            </div>
            
            <div class="input-area">
                <textarea id="messageInput" placeholder="请输入您的问题... (按 Enter 发送，Ctrl+Enter 换行)"></textarea>
                <button id="sendButton">发送 ➤</button>
            </div>
            
            <div class="stats">
                <span>Token 用量: <span id="tokenCount">0</span></span>
                <span>会话 ID: <span id="sessionId">-</span></span>
            </div>
        </div>
    </div>

    <script>
        // API配置
        window.API_CONFIG = {
            baseURL: 'http://localhost:3000',
            timeout: 30000
        };

        class QwenAIClient {
            constructor() {
                this.messages = [];
                this.sessionId = null;
                this.totalTokens = 0;
                this.authToken = null;
                
                this.initializeElements();
                this.bindEvents();
                this.loadModels();
                this.getAuthToken();
            }
            
            initializeElements() {
                this.messageInput = document.getElementById('messageInput');
                this.sendButton = document.getElementById('sendButton');
                this.messagesDiv = document.getElementById('messages');
                this.modelSelect = document.getElementById('modelSelect');
                this.temperature = document.getElementById('temperature');
                this.tempValue = document.getElementById('tempValue');
                this.tokenCount = document.getElementById('tokenCount');
                this.sessionIdSpan = document.getElementById('sessionId');
                this.statusDiv = document.getElementById('status');
                this.typingIndicator = document.getElementById('typingIndicator');
            }
            
            bindEvents() {
                this.sendButton.addEventListener('click', () => this.sendMessage());
                
                this.messageInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.ctrlKey && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });
                
                this.temperature.addEventListener('input', () => {
                    this.tempValue.textContent = this.temperature.value;
                });
            }
            
            async loadModels() {
                try {
                    const response = await fetch(`${window.API_CONFIG.baseURL}/api/models`);
                    const data = await response.json();
                    
                    if (data.success) {
                        this.modelSelect.innerHTML = data.models.map(m =>
                            `<option value="${m.id}" ${m.default ? 'selected' : ''}>${m.name} (${m.id})${m.default ? ' - 默认' : ''}</option>`
                        ).join('');
                    }
                } catch (error) {
                    this.showStatus(`加载模型失败: ${error.message}`, 'error');
                }
            }
            
            async getAuthToken() {
                try {
                    const response = await fetch(`${window.API_CONFIG.baseURL}/api/auth/client-token`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        this.authToken = data.token;
                        this.showStatus('认证成功', 'success');
                    } else {
                        this.showStatus(`认证失败: ${data.error}`, 'error');
                    }
                } catch (error) {
                    this.showStatus(`获取认证失败: ${error.message}`, 'error');
                }
            }
            
            async sendMessage() {
                const message = this.messageInput.value.trim();
                if (!message) return;
                
                // 添加用户消息
                this.addMessage('user', message);
                this.messageInput.value = '';
                
                // 显示打字指示器
                this.typingIndicator.style.display = 'block';
                this.sendButton.disabled = true;
                
                try {
                    const response = await fetch(`${window.API_CONFIG.baseURL}/api/conversation`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${this.authToken}`
                        },
                        body: JSON.stringify({
                            message: message,
                            sessionId: this.sessionId,
                            model: this.modelSelect.value,
                            temperature: parseFloat(this.temperature.value)
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        // 更新会话ID
                        this.sessionId = data.sessionId;
                        this.sessionIdSpan.textContent = this.sessionId;
                        
                        // 更新token统计
                        this.totalTokens += data.usage?.total_tokens || 0;
                        this.tokenCount.textContent = this.totalTokens;
                        
                        // 添加AI响应
                        this.addMessage('ai', data.response);
                    } else {
                        this.addMessage('ai', `错误: ${data.error}`);
                    }
                } catch (error) {
                    this.addMessage('ai', `请求失败: ${error.message}`);
                } finally {
                    // 隐藏打字指示器
                    this.typingIndicator.style.display = 'none';
                    this.sendButton.disabled = false;
                }
            }
            
            addMessage(role, content) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role}-message`;
                
                const roleName = role === 'user' ? '👤 您' : '🤖 Qwen AI';
                messageDiv.innerHTML = `
                    <div class="message-header">${roleName}</div>
                    <div class="message-content">${content.replace(/\n/g, '<br>')}</div>
                `;
                
                this.messagesDiv.appendChild(messageDiv);
                this.messagesDiv.scrollTop = this.messagesDiv.scrollHeight;
            }
            
            showStatus(message, type) {
                this.statusDiv.textContent = message;
                this.statusDiv.className = `status ${type}`;
                this.statusDiv.style.display = 'block';
                
                setTimeout(() => {
                    this.statusDiv.style.display = 'none';
                }, 3000);
            }
        }

        // 初始化Qwen AI客户端
        document.addEventListener('DOMContentLoaded', () => {
            new QwenAIClient();
        });
    </script>
</body>
</html>
