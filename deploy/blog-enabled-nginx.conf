# hxfund 项目 Nginx 配置
# 包含主站和博客模块的路由配置

server {
    listen 80;
    listen 443 ssl http2;
    server_name hxfund.cn www.hxfund.cn;

    # SSL 配置 (如果使用 HTTPS)
    # ssl_certificate /path/to/certificate.crt;
    # ssl_certificate_key /path/to/private.key;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/json 
        application/javascript 
        application/xml+rss 
        application/rss+xml 
        font/truetype 
        font/opentype 
        application/vnd.ms-fontobject 
        image/svg+xml;

    # 主站配置
    location / {
        alias /htdocs/;
        try_files $uri $uri/ @fallback;
        
        # 缓存静态资源
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 博客配置 - 静态文件服务
    location ^~ /blog {
        alias /htdocs/blog/;
        try_files $uri $uri/ @blog_fallback;
        
        # 博客静态资源缓存
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # SPA 路由支持 - 主站
    location @fallback {
        rewrite ^.*$ /index.html last;
    }

    # SPA 路由支持 - 博客 (处理 Hexo 生成的静态页面)
    location @blog_fallback {
        rewrite ^.*$ /blog/index.html last;
    }

    # API 代理 (如果后端服务在不同端口)
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 限制请求大小
    client_max_body_size 10M;

    # 日志配置
    access_log /var/log/nginx/hxfund.access.log;
    error_log /var/log/nginx/hxfund.error.log;
}