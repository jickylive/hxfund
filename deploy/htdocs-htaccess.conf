# hxfund.cn 虚拟主机 .htaccess 配置
# 位置：/htdocs/.htaccess

# 启用重写引擎
<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteBase /

    # 重定向根域名到 www
    RewriteCond %{HTTP_HOST} ^hxfund\.cn$ [NC]
    RewriteRule ^(.*)$ https://www.hxfund.cn/$1 [R=301,L]

    # /blog 请求重定向到 /blog/
    RewriteCond %{REQUEST_URI} ^/blog$
    RewriteRule ^blog$ /blog/ [R=301,L]

    # 将 /blog 请求指向 blog 子目录
    RewriteCond %{REQUEST_URI} !^/blog/
    RewriteRule ^blog(/.*)?$ /blog$1 [L]
</IfModule>

# 默认首页
<IfModule mod_dir.c>
    DirectoryIndex index.html index.php
</IfModule>

# 静态资源缓存
<IfModule mod_expires.c>
    ExpiresActive On

    # HTML
    ExpiresByType text/html "access plus 1 hour"

    # CSS & JavaScript
    ExpiresByType text/css "access plus 1 month"
    ExpiresByType application/javascript "access plus 1 month"
    ExpiresByType text/javascript "access plus 1 month"

    # Images
    ExpiresByType image/gif "access plus 1 year"
    ExpiresByType image/png "access plus 1 year"
    ExpiresByType image/jpg "access plus 1 year"
    ExpiresByType image/jpeg "access plus 1 year"
    ExpiresByType image/svg+xml "access plus 1 year"
    ExpiresByType image/webp "access plus 1 year"
    ExpiresByType image/x-icon "access plus 1 year"

    # Fonts
    ExpiresByType font/woff2 "access plus 1 year"
    ExpiresByType font/woff "access plus 1 year"
    ExpiresByType font/ttf "access plus 1 year"
    ExpiresByType application/font-woff "access plus 1 year"
    ExpiresByType application/font-woff2 "access plus 1 year"
</IfModule>

# Gzip 压缩
<IfModule mod_deflate.c>
    # 压缩文本类型
    AddOutputFilterByType DEFLATE text/html
    AddOutputFilterByType DEFLATE text/css
    AddOutputFilterByType DEFLATE text/plain
    AddOutputFilterByType DEFLATE text/xml
    AddOutputFilterByType DEFLATE application/javascript
    AddOutputFilterByType DEFLATE application/json
    AddOutputFilterByType DEFLATE application/xml
    AddOutputFilterByType DEFLATE application/rss+xml
    AddOutputFilterByType DEFLATE image/svg+xml

    # 排除已压缩文件
    SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|zip|gz|bz2|rar)$ no-gzip
</IfModule>

# 安全头
<IfModule mod_headers.c>
    # 防止点击劫持
    Header set X-Frame-Options "SAMEORIGIN"

    # 防止 MIME 类型嗅探
    Header set X-Content-Type-Options "nosniff"

    # XSS 防护
    Header set X-XSS-Protection "1; mode=block"

    # Referrer 策略
    Header set Referrer-Policy "strict-origin-when-cross-origin"

    # 内容安全策略（根据需要调整）
    # Header set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';"
</IfModule>

# 禁止访问敏感文件
<FilesMatch "^\.">
    Require all denied
</FilesMatch>

<FilesMatch "(^\.git|\.env|\.htaccess|\.htpasswd)$">
    Require all denied
</FilesMatch>

# 禁止目录浏览
<IfModule mod_autoindex.c>
    Options -Indexes
</IfModule>

# 自定义错误页面（可选）
# ErrorDocument 404 /404.html
# ErrorDocument 500 /500.html
