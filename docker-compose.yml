version: '3.8'

services:
  # 后端 API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huangshi-api
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ALLOWED_ORIGINS=https://hxfund.cn,https://www.hxfund.cn,https://huangshi.hxfund.cn
      # Redis 配置（可选）
      - REDIS_URL=redis://redis:6379
    volumes:
      # 挂载日志目录
      - ./logs:/app/logs
      # 挂载配置目录（敏感信息）
      - ./server/config:/app/server/config:ro
    networks:
      - huangshi-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # Redis 缓存（可选）
  redis:
    image: redis:latest
    container_name: huangshi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - huangshi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  # 前端静态文件服务
  frontend:
    image: nginx:alpine
    container_name: huangshi-frontend
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./deploy/frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - huangshi-network
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  huangshi-network:
    driver: bridge

volumes:
  redis-data:
