# 统一部署工作流 - hxfund 前端 + blog 子模块
# 部署到 www.hxfund.cn 及子目录 /blog

name: Deploy - Main + Blog

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.qwen/**'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '部署目标'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend-only
          - blog-only

# 并发控制
concurrency:
  group: deploy-main-blog-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # 构建 hxfund 前端
  # ============================================
  build-frontend:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_target != 'blog-only' }}

    permissions:
      contents: read

    timeout-minutes: 15

    steps:
      - name: 📥 检出代码（包含子模块）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🟢 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📦 安装依赖
        run: npm ci --only=production

      - name: 🔨 构建生产版本
        run: npm run build

      - name: 📦 保存构建产物
        uses: actions/upload-artifact@v4
        with:
          name: hxfund-frontend
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # ============================================
  # 构建 Hexo 博客
  # ============================================
  build-blog:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_target != 'frontend-only' }}

    permissions:
      contents: read

    timeout-minutes: 20

    steps:
      - name: 📥 检出代码（包含子模块）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 🟢 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blog/package-lock.json

      - name: 📦 安装博客依赖
        run: |
          cd blog
          npm ci --only=production --ignore-scripts
          npm install --only=dev

      - name: 🔨 生成 Hexo 静态文件
        run: |
          cd blog
          npx hexo clean
          npx hexo generate --bail
        env:
          NODE_ENV: production

      - name: 📦 保存博客构建产物
        uses: actions/upload-artifact@v4
        with:
          name: hexo-blog
          path: blog/public/
          retention-days: 7
          if-no-files-found: error

  # ============================================
  # 部署 hxfund 前端到虚拟主机
  # ============================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: ${{ github.event.inputs.deploy_target != 'blog-only' }}

    permissions:
      contents: read

    environment:
      name: production
      url: https://www.hxfund.cn/

    steps:
      - name: 📥 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: hxfund-frontend
          path: ./dist/

      - name: 📤 部署到虚拟主机 (/htdocs/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: ./dist/
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
          dangerous-clean-slate: false

      - name: ✅ 前端部署完成
        run: echo "✅ 前端已部署到 https://www.hxfund.cn"

  # ============================================
  # 部署 Hexo 博客到虚拟主机子目录
  # ============================================
  deploy-blog:
    runs-on: ubuntu-latest
    needs: build-blog
    if: ${{ github.event.inputs.deploy_target != 'frontend-only' }}

    permissions:
      contents: read

    environment:
      name: production
      url: https://www.hxfund.cn/blog/

    steps:
      - name: 📥 下载博客构建产物
        uses: actions/download-artifact@v4
        with:
          name: hexo-blog
          path: blog/public/

      - name: 📤 部署到虚拟主机 (/htdocs/blog/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: blog/public/
          server-dir: /htdocs/blog/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
          dangerous-clean-slate: false

      - name: ✅ 博客部署完成
        run: echo "✅ 博客已部署到 https://www.hxfund.cn/blog/"

  # ============================================
  # 部署后验证
  # ============================================
  verify-deployment:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-blog]
    if: always() && (needs.deploy-frontend.result == 'success' || needs.deploy-blog.result == 'success')

    steps:
      - name: 🧪 验证主站前端
        if: ${{ github.event.inputs.deploy_target != 'blog-only' }}
        run: |
          curl -I --fail --silent https://www.hxfund.cn/ || exit 1
          echo "✅ 主站前端访问正常"

      - name: 🧪 验证博客
        if: ${{ github.event.inputs.deploy_target != 'frontend-only' }}
        run: |
          curl -I --fail --silent https://www.hxfund.cn/blog/ || exit 1
          echo "✅ 博客访问正常"

      - name: 🧪 验证 API 健康
        run: |
          curl -I --fail --silent https://api.hxfund.cn/api/health || echo "⚠️ API 健康检查失败"
          echo "✅ API 健康检查完成"
